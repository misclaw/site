<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>misclaw</title>
    <meta
      name="description"
      content="misclaw — a home for small apps and research programs."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="icon" type="image/png" href="./misclaw.png" />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      // Apply a saved manual theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem("theme");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div class="page">
      <header class="masthead">
        <div class="masthead__row">
          <a class="wordmark" href="/">
            <img class="mc-logo mc-logo--light" src="./misclaw.png" alt="" width="44" height="44" />
            <img class="mc-logo mc-logo--dark" src="./misclaw-dark.png" alt="" width="44" height="44" />
            <span>misclaw<span class="dot">.app</span></span>
          </a>
          <button
            class="mc-theme"
            id="theme-toggle"
            title="Toggle light / dark mode"
            aria-label="Toggle light or dark mode"
          >
            <svg class="mc-icon-sun" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <svg class="mc-icon-moon" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
        <p class="tagline">A home for small apps and research programs.</p>
      </header>

      <main>
        <section class="projects" aria-labelledby="projects-heading">
          <div class="projects__header">
            <h2 id="projects-heading">Projects</h2>
            <span class="projects__count" id="project-count" hidden></span>
          </div>

          <!-- Populated from projects.json by app.js -->
          <ul class="project-list" id="project-list" aria-live="polite"></ul>

          <p class="empty-state" id="empty-state" hidden>
            No projects yet — they'll appear here as soon as the first one ships.
          </p>
        </section>
      </main>

      <footer class="footer">
        <span>© <span id="year"></span> misclaw</span>
        <a href="https://github.com/misclaw">github.com/misclaw</a>
      </footer>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
